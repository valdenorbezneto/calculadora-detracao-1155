<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Detração - Tema 1155 STJ</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.9rem; color: #64748b; margin-bottom: 30px; }
        
        .section-title { font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; color: #334155; font-size: 0.9rem; text-transform: uppercase; }

        .row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        input { padding: 10px; border: 1.5px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; }
        input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .result-box { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; }
        .result-box span { display: block; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .result-box label { font-size: 0.75rem; color: #64748b; }

        .minuta-section { margin-top: 30px; background: #fff; border: 1.5px dashed #cbd5e1; padding: 20px; border-radius: 8px; position: relative; }
        #minutaTexto { 
            white-space: pre-wrap; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.9rem; 
            color: #334155; 
            line-height: 1.5;
            background: none;
            border: none;
            width: 100%;
            height: 160px;
            resize: none;
            outline: none;
        }

        .btn-copy {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }

        .btn-copy:hover { background-color: #1e40af; }
        .btn-copy:active { transform: scale(0.98); }

        .badge-stj { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Calculadora de Detração</h1>
        <span class="badge-stj">TEMA 1155 STJ</span>
    </div>
    <p class="subtitle">Recurso Repetitivo REsp 1977135-SC</p>

    <div class="section-title">Parâmetros do Período</div>
    <div class="row">
        <div class="input-group">
            <label>Início do Recolhimento</label>
            <input type="date" id="dataInicio" onchange="calcular()">
        </div>
        <div class="input-group">
            <label>Fim do Recolhimento</label>
            <input type="date" id="dataFim" onchange="calcular()">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>Horas/Dia Útil</label>
            <input type="number" id="hUteis" value="10" oninput="calcular()">
        </div>
        <div class="input-group">
            <label>Horas/Fim de Semana</label>
            <input type="number" id="hFolga" value="24" oninput="calcular()">
        </div>
        <div class="input-group">
            <label>Feriados (Dias Úteis)</label>
            <input type="number" id="feriados" value="0" oninput="calcular()">
        </div>
    </div>

    <div class="section-title">Resultados do Cômputo</div>
    <div class="result-grid">
        <div class="result-box">
            <label>Total de Horas</label>
            <span id="resHoras">0</span>
        </div>
        <div class="result-box" style="background: #eff6ff; border-color: #bfdbfe;">
            <label>Dias de Detração</label>
            <span id="resDias" style="color: var(--secondary);">0</span>
        </div>
    </div>

    <div class="section-title">Texto para Minuta (Copie e Cole)</div>
    <div class="minuta-section">
        <textarea id="minutaTexto" readonly>Preencha as datas para gerar o texto da minuta...</textarea>
        <button class="btn-copy" onclick="copiarTexto()">
            <span>📋</span> Copiar Texto da Minuta
        </button>
    </div>
</div>

<script>
    function formatarData(dataStr) {
        if(!dataStr) return "";
        const [ano, mes, dia] = dataStr.split("-");
        return `${dia}/${mes}/${ano}`;
    }

    function calcular() {
        const dIniStr = document.getElementById('dataInicio').value;
        const dFimStr = document.getElementById('dataFim').value;
        
        if (!dIniStr || !dFimStr) return;

        const dIni = new Date(dIniStr + 'T12:00:00');
        const dFim = new Date(dFimStr + 'T12:00:00');
        
        if (dIni > dFim) return;

        let qtdUteis = 0;
        let qtdFolga = 0;
        let temp = new Date(dIni);

        while (temp <= dFim) {
            const diaSemana = temp.getDay();
            if (diaSemana === 0 || diaSemana === 6) qtdFolga++;
            else qtdUteis++;
            temp.setDate(temp.getDate() + 1);
        }

        const feriados = parseInt(document.getElementById('feriados').value) || 0;
        const reaisUteis = Math.max(0, qtdUteis - feriados);
        const reaisFolga = qtdFolga + feriados;
        const totalDiasCorridos = reaisUteis + reaisFolga;

        const hU = parseFloat(document.getElementById('hUteis').value) || 0;
        const hF = parseFloat(document.getElementById('hFolga').value) || 0;

        const totalHUteis = reaisUteis * hU;
        const totalHFolga = reaisFolga * hF;
        const totalHorasGeral = totalHUteis + totalHFolga;
        const diasDetracao = Math.floor(totalHorasGeral / 24);

        // Atualiza Cards
        document.getElementById('resHoras').innerText = totalHorasGeral.toLocaleString('pt-BR');
        document.getElementById('resDias').innerText = diasDetracao;

        // Gera Minuta
        const hoje = new Date().toLocaleDateString('pt-BR');
        const minuta = `Procedendo ao cálculo atualizado até a presente data (${hoje}):\n\nRecolhimento Domiciliar Cautelar: Cumprido desde ${formatarData(dIniStr)} até ${formatarData(dFimStr)} (${totalDiasCorridos} dias corridos).\nDias Úteis (${reaisUteis} dias x ${hU}h diárias): ${totalHUteis.toLocaleString('pt-BR')} horas.\nDias de folga (${reaisFolga} dias x ${hF}h diárias): ${totalHFolga.toLocaleString('pt-BR')} horas.\nTotal: ${totalHorasGeral.toLocaleString('pt-BR')} horas / 24 = ${diasDetracao} dias de detração.`;
        
        document.getElementById('minutaTexto').value = minuta;
    }

    function copiarTexto() {
        const copyText = document.getElementById("minutaTexto");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        
        const btn = document.querySelector('.btn-copy span:last-child');
        const originalText = btn.innerText;
        btn.innerText = "Texto Copiado!";
        setTimeout(() => { btn.innerText = originalText; }, 2000);
    }
</script>

</body>
</html>
